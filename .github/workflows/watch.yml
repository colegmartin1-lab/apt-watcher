name: watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: poll sources
        run: python apt_watcher.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: persist seen-listings DB
        run: |
          git config user.name "apt-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_listings.db
          git diff --cached --quiet || { git commit -m "update seen listings"; git push; }
